name: Build BO3 PS4 Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Installer les dépendances Linux (Make & Compilateurs)
      run: |
        sudo apt-get update
        sudo apt-get install -y make clang lld wget tar git

    - name: Installer l'OpenOrbis PS4 Toolchain
      run: |
        # Création du dossier de destination dans le répertoire personnel du runner
        mkdir -p $HOME/OpenOrbis
        
        # Téléchargement de l'archive officielle depuis le miroir d'archive de la communauté
        wget https://github.com/orbisdev/openorbis-toolchain/releases/download/v0.5.2/OpenOrbis-PS4-Toolchain.tgz -O OpenOrbis.tgz
        
        # Extraction propre
        tar -xzf OpenOrbis.tgz -C $HOME/OpenOrbis --strip-components=1
        rm OpenOrbis.tgz

    - name: Télécharger le SDK GoldHEN
      run: |
        git clone https://github.com/GoldHEN/GoldHEN_Plugins_SDK.git $HOME/GoldHEN_SDK

    - name: Compiler le Plugin (.prx)
      run: |
        # Déclaration explicite des variables requises par le Makefile
        export OO_PS4_TOOLCHAIN="$HOME/OpenOrbis"
        export GOLDHEN_SDK="$HOME/GoldHEN_SDK"
        
        # Ajout du dossier bin de la toolchain au PATH pour que "create-fself" soit trouvé
        export PATH="$OO_PS4_TOOLCHAIN/bin/linux:$PATH"
        
        # Nettoyage et compilation
        make clean
        make

    - name: Téléverser le fichier PRX (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: BO3-Plugin-PS4
        path: build/MyPluginPS4.prx
