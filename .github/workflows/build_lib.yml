name: Build GoldHEN Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du code du plugin
      uses: actions/checkout@v4

    - name: Installation de Clang, LLD et Make
      run: |
        sudo apt-get update
        sudo apt-get install -y clang lld make

    - name: Compilation du Plugin avec LLVM
      run: |
        # Configuration des drapeaux pour utiliser les inclusions locales du SDK
        cd MyPluginPS4
        make clean && make

    - name: Téléversement du binaire (.prx)
      uses: actions/upload-artifact@v4
      with:
        name: GoldHEN-MyPluginPS4-Artifact
        path: "MyPluginPS4/*.prx"
