name: Build BO3 PS4 Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Installer les dépendances Linux (Make & Compilateurs)
      run: |
        sudo apt-get update
        sudo apt-get install -y make clang lld git

    - name: Cloner la Toolchain OpenOrbis (Version Linux pré-compilée)
      run: |
        # On clone directement le dépôt qui contient l'arborescence complète et les outils Linux
        git clone https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain.git $HOME/OpenOrbis

    - name: Télécharger le SDK GoldHEN
      run: |
        git clone https://github.com/GoldHEN/GoldHEN_Plugins_SDK.git $HOME/GoldHEN_SDK

    - name: Compiler le Plugin (.prx)
      run: |
        # Configuration des variables d'environnement pour le Makefile
        export OO_PS4_TOOLCHAIN="$HOME/OpenOrbis"
        export GOLDHEN_SDK="$HOME/GoldHEN_SDK"
        
        # Ajout des outils Linux (comme create-fself) au PATH
        export PATH="$OO_PS4_TOOLCHAIN/bin/linux:$PATH"
        
        # Donner les permissions d'exécution aux outils OpenOrbis (sécurité Linux)
        chmod +x $OO_PS4_TOOLCHAIN/bin/linux/*
        
        # Lancement de la compilation
        make clean
        make

    - name: Téléverser le fichier PRX (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: BO3-Plugin-PS4
        path: build/MyPluginPS4.prx
