name: Build GoldHEN Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Installation de Clang et LLD
      run: |
        sudo apt-get update
        sudo apt-get install -y clang lld make wget tar

    - name: Installation d'OpenOrbis Toolchain v0.5.2
      run: |
        git clone --depth=1 --branch v0.5.2 https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain.git $HOME/OpenOrbis
        find $HOME/OpenOrbis/bin -type f -exec chmod +x {} \;

    - name: Injection de la Sysroot FreeBSD 12.2 (Ignorer l'erreur SSL d'archive)
      run: |
        cd $HOME/OpenOrbis
        # Ajout de --no-check-certificate pour forcer le téléchargement sur le serveur d'archive
        wget --no-check-certificate https://ftp-archive.freebsd.org/pub/FreeBSD-Archive/old/releases/amd64/12.2-RELEASE/base.txz
        tar -xf base.txz ./usr/include ./usr/lib
        rm base.txz
        ln -sfn $HOME/OpenOrbis/usr/include/c++/v1 $HOME/OpenOrbis/include/c++/v1

    - name: Génération automatique des Stubs (libc, libkernel)
      run: |
        cd $HOME/OpenOrbis/scripts
        python3 autobuild.py

    - name: Compilation de votre Plugin PS4
      run: |
        export OO_PS4_TOOLCHAIN="$HOME/OpenOrbis"
        cd MyPluginPS4
        make clean && make

    - name: Téléversement du binaire (.prx)
      uses: actions/upload-artifact@v4
      with:
        name: GoldHEN-MyPluginPS4-Artifact
        path: "MyPluginPS4/*.prx"
