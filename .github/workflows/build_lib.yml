name: Build BO3 PS4 Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Installer les dépendances Linux (Make & Compilateurs)
      run: |
        sudo apt-get update
        sudo apt-get install -y make clang lld

    - name: Configurer automatiquement l'OpenOrbis PS4 Toolchain
      uses: Almighty-Sausage/openorbis-action@v1
      # Cette action configure automatiquement la variable d'environnement OO_PS4_TOOLCHAIN

    - name: Télécharger le SDK GoldHEN
      run: |
        git clone https://github.com/GoldHEN/GoldHEN_Plugins_SDK.git $HOME/GoldHEN_SDK

    - name: Compiler le Plugin (.prx)
      run: |
        # On définit le chemin vers GoldHEN SDK pour notre Makefile
        export GOLDHEN_SDK="$HOME/GoldHEN_SDK"
        
        # Lancer la compilation
        make clean
        make

    - name: Téléverser le fichier PRX (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: BO3-Plugin-PS4
        path: build/MyPluginPS4.prx
