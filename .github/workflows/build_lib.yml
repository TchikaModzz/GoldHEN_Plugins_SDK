name: Build GoldHEN Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du code du plugin
      uses: actions/checkout@v4

    - name: Installation de Clang et LLD
      run: |
        sudo apt-get update
        sudo apt-get install -y clang lld make

    - name: Récupération des scripts de liaison OpenOrbis
      run: |
        # On clone uniquement les fichiers de configuration de l'éditeur de liens
        git clone --depth=1 https://github.com/OpenOrbis/OpenOrbis-PS4-Toolchain.git $HOME/OpenOrbis
        # Création d'une sysroot factice pour Clang
        mkdir -p $HOME/OpenOrbis/include
        mkdir -p $HOME/OpenOrbis/lib

    - name: Compilation du Plugin PS4
      run: |
        export OO_PS4_TOOLCHAIN="$HOME/OpenOrbis"
        cd MyPluginPS4
        make clean && make

    - name: Téléversement du binaire (.prx)
      uses: actions/upload-artifact@v4
      with:
        name: GoldHEN-MyPluginPS4-Artifact
        path: "MyPluginPS4/*.prx"
